<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes of Hell — FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :root { --bg: #0a0a0a; --text: #c0c0c8; --red: #ff2a2a; --dim: rgba(192,192,200,0.5); --dimmer: rgba(192,192,200,0.3); --dimmest: rgba(192,192,200,0.15); --line: rgba(255,255,255,0.06); }
  body { background: var(--bg); color: var(--text); font-family: 'PT Serif', Georgia, serif; font-size: 23px; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(255,42,42,0.3); color: #fff; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  body::after { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 100; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); }

  .bg-layer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; overflow: hidden; }
  .bg-layer .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: grayscale(60%) brightness(0.25); }
  .bg-layer::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.7) 60%, var(--bg) 100%); z-index: 1; }

  @keyframes redPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes logoFlicker { 0%, 92%, 100% { opacity: 1; } 93% { opacity: 0.6; } 94% { opacity: 1; } 95% { opacity: 0.7; } 96% { opacity: 1; } }

  .fade-in { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  .site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 80; background: rgba(10,10,10,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.04); padding: 0 24px; display: flex; align-items: center; justify-content: center; gap: 32px; height: 48px; }
  .site-nav a { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: rgba(192,192,200,0.4); text-decoration: none; padding: 14px 0; border-bottom: 2px solid transparent; transition: all 0.3s ease; }
  .site-nav a:hover { color: var(--text); }
  .site-nav a.active { color: var(--red); border-bottom-color: var(--red); }
  .site-nav .nav-logo { height: 28px; width: auto; margin-right: 16px; }

  .logo-top { display: block; margin: 0 auto 20px; width: 180px; height: auto; animation: logoFlicker 4s infinite; }

  .content { max-width: 800px; margin: 0 auto; padding: 80px 24px 60px; position: relative; z-index: 2; }

  .page-header { text-align: center; margin-bottom: 48px; }
  .page-header h1 { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text); }
  .page-header .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; color: rgba(255,42,42,0.5); margin-top: 8px; animation: redPulse 3s ease infinite; }

  .faq-section { margin-bottom: 40px; }
  .faq-section-title { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--red); border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 16px; }

  .faq-item { background: rgba(10,10,10,0.7); border: 1px solid var(--line); border-left: 3px solid rgba(255,42,42,0.3); border-radius: 2px; margin-bottom: 8px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  .faq-item:hover { background: rgba(10,10,10,0.85); border-color: rgba(255,42,42,0.4); border-left-color: var(--red); }
  .faq-item.open { background: rgba(10,10,10,0.9); border-color: rgba(255,42,42,0.3); border-left-color: var(--red); box-shadow: 0 0 12px rgba(255,42,42,0.15); }

  .faq-question { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
  .faq-question span { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.8px; color: var(--text); }
  .faq-arrow { color: rgba(255,255,255,0.25); font-size: 18px; transition: transform 0.3s ease; flex-shrink: 0; margin-left: 12px; }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }

  .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, opacity 0.3s ease; opacity: 0; }
  .faq-item.open .faq-answer { max-height: 600px; opacity: 1; }
  .faq-answer-inner { padding: 0 20px 16px; color: var(--dim); font-size: 15px; line-height: 1.7; }
  .faq-answer-inner a { color: var(--red); text-decoration: none; border-bottom: 1px solid rgba(255,42,42,0.3); transition: all 0.2s ease; }
  .faq-answer-inner a:hover { border-bottom-color: var(--red); }

  @media (max-width: 600px) {
    .site-nav { gap: 20px; padding: 0 16px; }
    .site-nav .nav-logo { margin-right: 8px; }
    .content { padding: 70px 16px 40px; }
  }
</style>
</head>

        a: "Navigate to <strong>#create-a-ticket</strong> in our <a href=\"https://discord.gg/echoes-of-hell\" target=\"_blank\">Discord</a> and follow the prompts. We typically answer tickets within 30 minutes during normal hours. <strong>Creating a ticket regarding Ban Appeals or Staff Applications will not expedite their review.</strong>"

      {
        q: "I've been banned — now what?",
        a: "Navigate to <strong>#public-strikes</strong> to review the reasoning. If you feel like you deserve a second chance and want to appeal, file a <strong>#ban-appeal-application</strong>. These are reviewed typically two to three times a week by our Head Admin."

      {
        q: "What's the difference between Vietnam Pub 1, 2, and 3?",
        a: "All 3 servers have the same mod list. <strong>Server 1</strong> typically has the highest pop — the higher the player count, the more chaos and the faster matches complete. <strong>Server 2</strong> typically holds between 50–90 during the week and max pop on weekends. It hosts our more organized players and is more challenging due to the lower player count. <strong>Server 3</strong> is the <em>hardcore</em> server — low player count means less help, less CAS, and a much harder time rolling through objectives. Server 3 is also our event server where most events are held. Navigate to <strong>#role-selection</strong> in Discord to be notified for all events including PTSD mode and more."
      },
      {
        q: "Can I play as NVA / PVP?",

      },
      {
        q: "How do I become XYZ role?",

    var aInner = document.createElement('div');
    aInner.className = 'faq-answer-inner';
    aInner.innerHTML = item.a;
    aDiv.appendChild(aInner);

    faq.appendChild(qDiv);
    faq.appendChild(aDiv);

    faq.addEventListener('click', function() {
      this.classList.toggle('open');
    });

    sDiv.appendChild(faq);
  });

  container.appendChild(sDiv);
});

var observer = new IntersectionObserver(function(entries) {
  entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-in').forEach(function(el) { observer.observe(el); });
</script>
