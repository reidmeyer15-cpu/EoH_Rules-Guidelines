<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echoes of Hell — Meet the Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  :root {
    --bg: #0a0a0a; --text: #c0c0c8; --red: #ff2a2a;
    --owner: #ff2a2a; --senior: #e05a2a; --head: #e8a012; --admin: #7a8a6e; --special: #c4a243;
    --dim: rgba(232,228,220,0.5); --dimmer: rgba(232,228,220,0.3); --dimmest: rgba(232,228,220,0.15);
    --line: rgba(255,255,255,0.06);
  }
  body { background: var(--bg); color: var(--text); font-family: 'PT Serif', Georgia, serif; font-size: 23px; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(255,42,42,0.3); color: #fff; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* Scanlines */
  body::after {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  /* Background */
  .bg-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; overflow: hidden;
  }
  .bg-layer .bg-image {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; background-position: center;
    filter: grayscale(50%) brightness(0.3); opacity: 1;
  }
  .bg-layer::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at center, rgba(10,10,10,0.65) 0%, rgba(10,10,10,0.85) 60%, var(--bg) 100%);
    z-index: 1;
  }

  @keyframes redPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes flicker { 0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.8; } 97% { opacity: 1; } 98% { opacity: 0.85; } }
  @keyframes logoFlicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.6; }
    94% { opacity: 1; }
    95% { opacity: 0.7; }
    96% { opacity: 1; }
  }
  .fade-in { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* Nav */
  .site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 80;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: center;
    gap: 32px; height: 48px;
  }
  .site-nav a {
    font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(232,228,220,0.4); text-decoration: none;
    padding: 14px 0; border-bottom: 2px solid transparent; transition: all 0.3s ease;
  }
  .site-nav a:hover { color: var(--text); }
  .site-nav a.active { color: var(--red); border-bottom-color: var(--red); }
  .site-nav .nav-logo { height: 28px; width: auto; mix-blend-mode: screen; margin-right: 16px; }

  /* Header */
  header {
    text-align: center; padding: 140px 20px 60px; position: relative;
  }
  header > * { position: relative; z-index: 2; }
  .logo-top { display: block; margin: 0 auto 20px; width: 150px; height: auto; animation: logoFlicker 4s infinite; mix-blend-mode: screen; }
  .server-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 4px; color: rgba(255,42,42,0.5); margin-bottom: 16px; animation: redPulse 3s ease infinite; }
  h1.main-title { font-family: 'Oswald', sans-serif; font-size: clamp(32px, 6vw, 56px); font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--text); line-height: 1.1; animation: flicker 8s infinite; }
  .red-bar { width: 60px; height: 2px; background: var(--red); margin: 20px auto; box-shadow: 0 0 10px rgba(255,42,42,0.5); }
  .header-sub { font-family: 'Oswald', sans-serif; font-size: clamp(13px, 2vw, 18px); font-weight: 300; letter-spacing: 5px; color: var(--dim); text-transform: uppercase; }

  /* Content */
  main { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 2; }

  /* Role group */
  .role-group { margin-bottom: 48px; }
  .role-header {
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding-bottom: 10px; margin-bottom: 16px;
  }
  .role-header h2 {
    font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600;
    letter-spacing: 2.5px; text-transform: uppercase;
  }
  .role-header .role-count {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(232,228,220,0.25); margin-left: 10px;
  }

  /* Member cards */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 10px;
  }
  .member-card {
    background: rgba(10,10,10,0.7);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 2px;
    padding: 14px 16px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: all 0.3s ease;
    display: flex; align-items: center; gap: 12px;
  }
  .member-card:hover {
    background: rgba(10,10,10,0.85);
    border-color: rgba(255,255,255,0.1);
  }
  .member-card[data-role="owner"] { border-left-color: var(--owner); }
  .member-card[data-role="senior"] { border-left-color: var(--senior); }
  .member-card[data-role="head"] { border-left-color: var(--head); }
  .member-card[data-role="special"] { border-left-color: var(--special); }
  .member-card[data-role="admin"] { border-left-color: var(--admin); }

  .member-card:hover[data-role="owner"] { border-left-color: var(--owner); box-shadow: 0 0 12px rgba(255,42,42,0.2); }
  .member-card:hover[data-role="senior"] { border-left-color: var(--senior); box-shadow: 0 0 12px rgba(224,90,42,0.15); }
  .member-card:hover[data-role="head"] { border-left-color: var(--head); box-shadow: 0 0 12px rgba(232,160,18,0.15); }

  .member-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
    color: rgba(232,228,220,0.3);
  }

  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500;
    letter-spacing: 0.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .member-role {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.5px; margin-top: 2px;
  }

  [data-role="owner"] .member-role { color: var(--owner); }
  [data-role="senior"] .member-role { color: var(--senior); }
  [data-role="head"] .member-role { color: var(--head); }
  [data-role="special"] .member-role { color: var(--special); }
  [data-role="admin"] .member-role { color: var(--admin); }

  .logo-bottom { display: block; margin: 40px auto 0; width: 120px; height: auto; animation: logoFlicker 5s infinite; animation-delay: 1.5s; mix-blend-mode: screen; }



  .member-card.glow-name .member-name {
    animation: fireGlow 8s ease-in-out infinite;
  }
  @keyframes fireGlow {
    0%, 100% { color: #ff2a2a; text-shadow: 0 0 8px rgba(255,42,42,0.6), 0 0 20px rgba(255,42,42,0.3), 0 0 40px rgba(255,20,0,0.15); }
    20% { color: #ff6a00; text-shadow: 0 0 10px rgba(255,106,0,0.7), 0 0 25px rgba(255,80,0,0.4), 0 0 50px rgba(255,60,0,0.2); }
    40% { color: #ffaa00; text-shadow: 0 0 12px rgba(255,170,0,0.8), 0 0 30px rgba(255,140,0,0.5), 0 0 60px rgba(255,100,0,0.25); }
    60% { color: #ffe040; text-shadow: 0 0 14px rgba(255,224,64,0.7), 0 0 28px rgba(255,180,20,0.4), 0 0 55px rgba(255,120,0,0.2); }
    80% { color: #ff8800; text-shadow: 0 0 10px rgba(255,136,0,0.7), 0 0 24px rgba(255,100,0,0.4), 0 0 45px rgba(255,50,0,0.2); }
  }
  .member-about {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 1px;
    color: #ffffff;
    margin-top: 4px;
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
  }
  .member-card.show-about .member-about {
    max-height: 40px; opacity: 1; margin-top: 6px;
  }
  footer { text-align: center; padding: 40px 20px 60px; background: #000000; position: relative; z-index: 2; }
  .footer-bar { width: 30px; height: 2px; background: var(--red); margin: 0 auto 16px; box-shadow: 0 0 8px rgba(255,42,42,0.3); }
  footer .version { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(232,228,220,0.2); }
  footer a { color: rgba(255,42,42,0.4); text-decoration: none; transition: color 0.3s; }
  footer a:hover { color: var(--red); }

  @media (max-width: 600px) {
    .member-grid { grid-template-columns: 1fr; }
    main { padding: 0 16px 60px; }
    .site-nav { gap: 20px; padding: 0 16px; }
    .site-nav .nav-logo { margin-right: 8px; }
  }
</style>
</head>

  { group: "Senior Admins", role: "senior", members: [

    { name: "WAVE", title: "Senior Admin", about: "Admin Probationary Board Member" }
  ]},
  { group: "Social Media", role: "special", members: [
    { name: "Aqua", title: "Admin / Social Media Manager", about: "Admin Probationary Board Member" }
  ]},
  { group: "Admins", role: "admin", members: [
    { name: "Starvin_Marvin" },
    { name: "Bubbatmw", about: "Admin Probationary Board Member" },
    { name: "Pockets" },
    { name: "IAmAGuest" },
    { name: "LONER18" },
    { name: "RebelOfTheNorth_" },
    { name: "cs731565" },
    { name: "Rage", about: "Admin Probationary Board Member" },
    { name: "SinFoeLane" },
    { name: "NobleFenris" },
    { name: "OG_VINCEDEBOSS", about: "LEADER OF DORKS" },
    { name: "KvFxBombastic" },
    { name: "ghost dragon56" },
    { name: "ThunderCock", about: "Admin Probationary Board Member" },
    { name: "Yuri", about: "Admin Probationary Board Member" },

    { name: "Crazybro245" },
    { name: "Mr. Decoy" },
    { name: "Winnie the flu", about: "Admin Probationary Board Member" },
    { name: "KingOfHearts", about: "Admin Probationary Board Member" },
    { name: "Exo Famoose" },
    { name: "OiledUpGranny" }
  ]}
];

var main = document.getElementById('mainContent');

TEAM.forEach(function(group) {
  var section = document.createElement('div');
  section.className = 'role-group fade-in';

  var roleLabel = group.role === 'owner' ? 'OWNER' :
                  group.role === 'senior' ? 'SENIOR ADMIN' :
                  group.role === 'head' ? 'HEAD ADMIN' :
                  group.role === 'special' ? '' :
                  'ADMIN';

  section.innerHTML = '<div class="role-header"><h2 style="color:var(--' + group.role + ')">' +
    group.group + '<span class="role-count">' + group.members.length + '</span></h2></div>';

  var grid = document.createElement('div');
  grid.className = 'member-grid';

  group.members.forEach(function(member, i) {
    var card = document.createElement('div');
    card.className = 'member-card';
    card.dataset.role = group.role;
    card.style.transitionDelay = (i * 0.03) + 's';

    var initials = member.name.charAt(0).toUpperCase();
    var title = member.title || roleLabel;

    var aboutHtml = member.about ? '<div class="member-about">' + member.about + '</div>' : '';
    card.innerHTML =
      '<div class="member-avatar">' + initials + '</div>' +
      '<div class="member-info">' +
        '<div class="member-name">' + member.name + '</div>' +
        '<div class="member-role">' + title + '</div>' +
        aboutHtml +
      '</div>';
    if (member.glow) { card.classList.add('glow-name'); }
    if (member.about) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', function() { card.classList.toggle('show-about'); });
    }

    grid.appendChild(card);
  });

  section.appendChild(grid);
  main.appendChild(section);
});

// Fade-in observer
document.querySelectorAll('.fade-in').forEach(function(el) {
  new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 }).observe(el);
});
